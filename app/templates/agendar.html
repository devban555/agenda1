<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendamento | Reserve seu Horário</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.5);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      perspective: 1000px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -1px;
      background: linear-gradient(to right, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.desc {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-size: 1.1rem;
      pointer-events: none;
      transition: 0.3s;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input:focus {
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .input-group input:focus + i {
      filter: drop-shadow(0 0 5px var(--primary));
    }

    /* Estilização para inputs de data/hora */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      opacity: 0.6;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.4s;
      box-shadow: 0 10px 20px var(--primary-glow);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px var(--primary-glow);
      background: #4f91ff;
    }

    button:active { transform: translateY(0); }

    .mensagem {
      margin-top: 25px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 15px;
      border-radius: 16px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 480px) {
      .card { padding: 30px 20px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>Reserve seu Horário</h1>
      <p class="desc">Escolha o melhor momento para você.</p>

      <form method="POST">
        <div class="input-group">
          <i class="fa-regular fa-user"></i>
          <input type="text" name="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" name="telefone" placeholder="Telefone / WhatsApp" required>
        </div>

        <div class="input-group">
          <i class="fa-regular fa-calendar"></i>
          <input type="date" name="data" required title="Escolha a data">
        </div>

        <div class="input-group">
          <i class="fa-regular fa-clock"></i>
          <input type="time" name="hora" required title="Escolha o horário">
        </div>

        <button type="submit">
          Confirmar Agendamento <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="mensagem">
            <i class="fa-solid fa-circle-check"></i> {{ messages[0] }}
          </div>
        {% endif %}
      {% endwith %}
    </section>
  </div>
</body>
</html>
