<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marketing & Eventos | Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --border: rgba(255, 255, 255, 0.08);

      /* Gradients para campanhas */
      --grad-discount: linear-gradient(135deg, #f43f5e, #fb7185);
      --grad-draw: linear-gradient(135deg, #8b5cf6, #c084fc);
      --grad-loyalty: linear-gradient(135deg, #10b981, #34d399);
      --grad-flash: linear-gradient(135deg, #f59e0b, #fbbf24);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.08) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 60px 20px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 10px;
    }

    .wrap {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      width: 100%;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .panel-head {
      margin-bottom: 30px;
      border-left: 4px solid var(--primary);
      padding-left: 15px;
    }

    .panel-title {
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* GRID DE CAMPANHAS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .btn-campaign {
      position: relative;
      height: 160px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: #fff;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .btn-campaign i {
      font-size: 2.2rem;
      transition: all 0.4s;
    }

    .btn-campaign span {
      font-weight: 700;
      font-size: 1rem;
    }

    /* Cores e Efeitos de Seleção */
    .btn-campaign[data-action="descontaco"].is-selected { background: var(--grad-discount); border-color: transparent; transform: scale(1.05); }
    .btn-campaign[data-action="sorteio"].is-selected { background: var(--grad-draw); border-color: transparent; transform: scale(1.05); }
    .btn-campaign[data-action="fidelidade"].is-selected { background: var(--grad-loyalty); border-color: transparent; transform: scale(1.05); }
    .btn-campaign[data-action="oferta"].is-selected { background: var(--grad-flash); border-color: transparent; transform: scale(1.05); }

    .btn-campaign:hover:not(.is-selected) {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-campaign.is-selected i {
      transform: scale(1.2) rotate(-5deg);
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
    }

    /* Dica e Rodapé */
    .hint {
      margin-top: 30px;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      font-style: italic;
    }

    .voltar {
      text-align: center;
      margin: 40px 0;
    }

    .voltar a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 14px;
      transition: 0.3s;
    }

    .voltar a:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
      transform: translateX(-5px);
    }

    @media (max-width: 600px) {
      .panel { padding: 25px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .btn-campaign { height: 130px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Marketing Hub</h1>
    <div class="subtitle">Selecione uma campanha para impulsionar seu negócio.</div>
  </header>

  <div class="wrap">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Campanhas Rápidas</div>
      </div>

      <div class="grid">
        <button class="btn-campaign" data-action="descontaco" type="button">
          <i class="fa-solid fa-percent"></i>
          <span>Descontaco</span>
        </button>

        <button class="btn-campaign" data-action="sorteio" type="button">
          <i class="fa-solid fa-ticket"></i>
          <span>Sorteio</span>
        </button>

        <button class="btn-campaign" data-action="fidelidade" type="button">
          <i class="fa-solid fa-star"></i>
          <span>Fidelidade</span>
        </button>

        <button class="btn-campaign" data-action="oferta" type="button">
          <i class="fa-solid fa-bolt-lightning"></i>
          <span>Oferta Flash</span>
        </button>
      </div>

      <div class="hint">
        <i class="fa-solid fa-circle-info"></i> Selecione um modelo para configurar os detalhes da promoção.
      </div>
    </section>
  </div>

  <div class="voltar">
    <a href="/painel">
      <i class="fa-solid fa-arrow-left"></i> Voltar ao Painel ADM
    </a>
  </div>

  <script>
    const buttons = document.querySelectorAll('.btn-campaign');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('is-selected'));
        btn.classList.add('is-selected');
      });
    });
  </script>

</body>
</html>
