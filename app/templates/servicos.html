<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Serviços | Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.4);
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.08);
            --glass-input: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* FORMULÁRIO DE CRIAÇÃO */
        .form-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: var(--glass-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-create {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 48px;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            filter: brightness(1.1);
        }

        /* LISTAGEM (TABELA) */
        .table-container {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255,255,255,0.03);
            padding: 18px 20px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }

        /* INPUTS DA TABELA */
        .table-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .table-input:not([disabled]) {
            background: var(--glass-input);
            border-color: var(--border);
        }

        /* BOTÕES DE AÇÃO */
        .acoes {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .btn-edit { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
        .btn-edit:hover { background: var(--primary); color: white; }

        .btn-save { background: var(--success); display: none; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* RODAPÉ */
        .voltar { text-align: center; margin-top: 40px; }
        .voltar a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .voltar a:hover { color: #fff; transform: translateX(-5px); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            th:nth-child(2), td:nth-child(2) { display: none; } /* Esconde tempo no mobile para caber */
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Gerenciar Serviços</h1>

    <div class="form-card">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Título do Serviço</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-tag"></i>
                        <input type="text" name="titulo" placeholder="Ex: Corte de Cabelo" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-coins"></i>
                        <input type="text" name="valor" placeholder="0,00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tempo Estimado</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-clock"></i>
                        <input type="text" name="tempo" placeholder="30 min" required>
                    </div>
                </div>
                <button type="submit" class="btn-create">
                    <i class="fa-solid fa-plus"></i> Criar
                </button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Serviço</th>
                    <th>Valor</th>
                    <th>Tempo</th>
                    <th style="text-align:right;">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for servico in servicos %}
                <tr id="linha-{{ servico.id }}">
                    <td>
                        <input type="text" class="table-input" id="titulo-{{ servico.id }}" value="{{ servico.titulo }}" disabled>
                    </td>
                    <td style="width: 120px;">
                        <input type="text" class="table-input" id="valor-{{ servico.id }}" value="{{ servico.valor }}" disabled>
                    </td>
                    <td style="width: 120px;">
                        <input type="text" class="table-input" id="tempo-{{ servico.id }}" value="{{ servico.tempo }}" disabled>
                    </td>
                    <td class="acoes">
                        <button class="action-btn btn-edit" onclick="habilitarEdicao({{ servico.id }})" title="Editar">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button class="action-btn btn-save" id="salvar-{{ servico.id }}" onclick="salvarEdicao({{ servico.id }})" title="Salvar">
                            <i class="fa-solid fa-check"></i>
                        </button>
                        <button class="action-btn btn-delete" onclick="excluirServico({{ servico.id }})" title="Excluir">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align:center; padding: 40px; color: var(--muted);">
                        Nenhum serviço cadastrado ainda.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="voltar">
        <a href="/painel">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Painel
        </a>
    </div>
</div>

<script>
    function habilitarEdicao(id) {
        document.getElementById('titulo-' + id).disabled = false;
        document.getElementById('valor-' + id).disabled = false;
        document.getElementById('tempo-' + id).disabled = false;
        document.getElementById('salvar-' + id).style.display = 'flex';

        // Foco automático no primeiro campo
        document.getElementById('titulo-' + id).focus();
    }

    function salvarEdicao(id) {
        const titulo = document.getElementById('titulo-' + id).value;
        const valor = document.getElementById('valor-' + id).value;
        const tempo = document.getElementById('tempo-' + id).value;

        fetch('/editar_servico/' + id, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titulo, valor, tempo })
        }).then(response => {
            if (response.ok) {
                location.reload();
            } else {
                alert("Erro ao atualizar serviço.");
            }
        });
    }

    function excluirServico(id) {
        if (confirm("Tem certeza que deseja excluir este serviço?")) {
            fetch('/excluir_servico/' + id, { method: 'POST' })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else {
                    alert("Erro ao excluir serviço.");
                }
            });
        }
    }
</script>

</body>
</html>
