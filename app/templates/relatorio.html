<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relatório Estratégico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 50px;
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .cards-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 30px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Ícone flutuante de fundo */
    .card i.bg-icon {
      position: absolute;
      right: -10px;
      bottom: -10px;
      font-size: 5rem;
      opacity: 0.05;
      transform: rotate(-15deg);
    }

    .metric {
      margin: 15px 0 5px;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
    }

    .label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    /* Cores Temáticas */
    .card.total .metric { color: var(--primary); }
    .card.best .metric { color: var(--success); }
    .card.cancelled .metric { color: var(--danger); }
    .card.year .metric { color: var(--warning); }

    .icon-box {
      width: 50px;
      height: 50px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .total .icon-box { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
    .best .icon-box { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .cancelled .icon-box { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .year .icon-box { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

    .voltar {
      text-align: center;
      margin-top: 60px;
    }

    .voltar a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      padding: 12px 28px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      font-weight: 700;
      transition: all 0.3s;
    }

    .voltar a:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
      border-color: var(--primary);
      transform: translateX(-5px);
    }
  </style>
</head>
<body>

  <h1>Relatório Executivo</h1>

  <div class="cards-grid">
    <article class="card total">
      <div class="icon-box"><i class="fa-solid fa-calendar-check"></i></div>
      <h2 class="metric">{{ total_agendamentos }}</h2>
      <div class="label">Total Geral</div>
      <i class="fa-solid fa-calendar-check bg-icon"></i>
    </article>

    <article class="card best">
      <div class="icon-box"><i class="fa-solid fa-crown"></i></div>
      <h2 class="metric" style="font-size: 2rem; margin: 25px 0 15px;">{{ melhor_mes if melhor_mes else "N/A" }}</h2>
      <div class="label">Mês de Pico</div>
      <i class="fa-solid fa-chart-line bg-icon"></i>
    </article>

    <article class="card cancelled">
      <div class="icon-box"><i class="fa-solid fa-calendar-xmark"></i></div>
      <h2 class="metric">{{ total_cancelados }}</h2>
      <div class="label">Cancelamentos</div>
      <i class="fa-solid fa-calendar-xmark bg-icon"></i>
    </article>

    <article class="card year">
      <div class="icon-box"><i class="fa-solid fa-arrow-trend-up"></i></div>
      <h2 class="metric">{{ total_no_ano }}</h2>
      <div class="label">Acumulado do Ano</div>
      <i class="fa-solid fa-calendar-days bg-icon"></i>
    </article>
  </div>

  <div class="voltar">
    <a href="/painel">
      <i class="fa-solid fa-chevron-left"></i> Painel de Controle
    </a>
  </div>

</body>
</html>
