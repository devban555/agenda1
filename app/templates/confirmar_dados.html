<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirmar Dados | Finalizar Agendamento</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.3);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin: 0 0 24px;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }

    /* CARD DE TICKET/RESUMO */
    .ticket {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      position: relative;
    }

    .ticket-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .ticket-row:last-child { margin-bottom: 0; }

    .ticket-row i {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 0.9rem;
    }

    .ticket-info {
      display: flex;
      flex-direction: column;
    }

    .ticket-info span:first-child {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
    }

    .ticket-info span:last-child {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    /* FORMULÁRIO */
    .field-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .field-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      transition: 0.3s;
    }

    form input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
    }

    form input:focus {
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    form input:focus + i {
      color: var(--primary);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: var(--success);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 10px 20px var(--success-glow);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 15px 30px var(--success-glow);
    }

    button:active { transform: translateY(0); }

    /* VOLTAR */
    .voltar { margin-top: 24px; text-align: center; }
    .voltar a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.3s;
    }
    .voltar a:hover { color: #fff; }

    @media (max-width: 480px) {
      .container { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Quase lá...</h2>

    <div class="ticket">
      <div class="ticket-row">
        <i class="fa-solid fa-scissors"></i>
        <div class="ticket-info">
          <span>Serviço Selecionado</span>
          <span>{{ servico }}</span>
        </div>
      </div>
      <div class="ticket-row">
        <i class="fa-regular fa-calendar-check"></i>
        <div class="ticket-info">
          <span>Data e Horário</span>
          <span>{{ data }} às {{ hora }}</span>
        </div>
      </div>
    </div>

    <form method="POST" action="/salvar_agendamento">
      <div class="field-wrap">
        <input type="text" name="nome" placeholder="Seu nome completo" required>
        <i class="fa-regular fa-user"></i>
      </div>

      <div class="field-wrap">
        <input type="text" name="telefone" placeholder="Seu WhatsApp" required>
        <i class="fa-solid fa-phone"></i>
      </div>

      <input type="hidden" name="servico" value="{{ servico }}">
      <input type="hidden" name="servico_id" value="{{ servico_id }}">
      <input type="hidden" name="data" value="{{ data }}">
      <input type="hidden" name="hora" value="{{ hora }}">

      <button type="submit">
        Finalizar Agendamento <i class="fa-solid fa-check-double"></i>
      </button>
    </form>
  </div>

  <div class="voltar">
    <a href="/service">
      <i class="fa-solid fa-chevron-left"></i> Alterar horário ou serviço
    </a>
  </div>

</body>
</html>
