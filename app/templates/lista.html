<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Contatos | CRM Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      margin-bottom: 40px;
      background: linear-gradient(to right, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .wrap { max-width: 1100px; margin: 0 auto; }

    /* FILTROS E PESQUISA */
    .controls-container {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .botoes-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-filter {
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-filter.active-green:hover { border-color: var(--success); color: var(--success); }
    .btn-filter.active-red:hover { border-color: var(--danger); color: var(--danger); }

    .pesquisa-container {
      display: flex;
      gap: 12px;
    }

    .input-group {
      position: relative;
      flex: 1;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: white;
      font-family: inherit;
      transition: 0.3s;
    }

    .input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .btn-search {
      padding: 0 25px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-search:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }

    /* TABELA */
    .table-card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; min-width: 800px; }

    th {
      background: rgba(255,255,255,0.03);
      padding: 18px 20px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    td { padding: 18px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

    tbody tr:hover { background: rgba(59, 130, 246, 0.03); }

    .contact-name { font-weight: 700; color: #fff; }

    .contact-phone {
      color: var(--primary);
      text-decoration: none;
      font-family: monospace;
      font-size: 1rem;
    }

    .badge-count {
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .status {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .status-ativo { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-inativo { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

    /* PAGINAÇÃO */
    .paginacao {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px;
      border-top: 1px solid var(--border);
    }

    .page-btn {
      min-width: 40px;
      height: 40px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .voltar { text-align: center; margin-top: 40px; }
    .voltar a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }
    .voltar a:hover { color: #fff; transform: translateX(-5px); }

    @media (max-width: 768px) {
      .pesquisa-container { flex-direction: column; }
      .btn-search { padding: 14px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>Lista de Contatos</h1>

    <div class="controls-container">
      <div class="botoes-container">
        <button class="btn-filter active-green">
          <i class="fa-solid fa-circle-check"></i> Contatos Ativos
        </button>
        <button class="btn-filter active-red">
          <i class="fa-solid fa-circle-xmark"></i> Contatos Inativos
        </button>
      </div>

      <div class="pesquisa-container">
        <div class="input-group">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input class="input" type="text" placeholder="Nome, telefone ou ID...">
        </div>
        <button class="btn-search">Buscar</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome do Cliente</th>
              <th>Telefone</th>
              <th>Agendamentos</th>
              <th>Última Visita</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#001</td>
              <td class="contact-name">João Silva</td>
              <td><a href="tel:11999990000" class="contact-phone">(11) 99999-0000</a></td>
              <td><span class="badge-count">5</span></td>
              <td style="color: var(--muted)">12/08/2025</td>
              <td><span class="status status-ativo">ATIVO</span></td>
            </tr>
            <tr>
              <td>#002</td>
              <td class="contact-name">Maria Souza</td>
              <td><a href="tel:11988881111" class="contact-phone">(11) 98888-1111</a></td>
              <td><span class="badge-count">2</span></td>
              <td style="color: var(--muted)">05/07/2025</td>
              <td><span class="status status-inativo">INATIVO</span></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="paginacao">
        <button class="page-btn"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="page-btn">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>

    <div class="voltar">
      <a href="/painel">
        <i class="fa-solid fa-arrow-left"></i> Painel Administrativo
      </a>
    </div>
  </div>

</body>
</html>
